<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body></body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const at = params.get('access_token');
  const rt = params.get('refresh_token');
  
  if (at) {
    // Redirect back to app via deep link
    window.location.href = 'com.fennec.academy://callback#' + hash;
    // Fallback: show message if redirect doesn't work
    setTimeout(() => {
      document.body.innerHTML = '<div style="padding:20px;font:14px sans-serif;text-align:center">Redirecting to app failed.<br>Close this tab and return to Fennec.</div>';
    }, 3000);
  } else {
    document.body.innerHTML = '<div style="padding:20px;font:14px sans-serif;text-align:center">No token found. Request a new password reset from the app.</div>';
  }
</script>
</html>
