<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fennec Academy — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #f8fafc; }
    p { color: #94a3b8; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; margin-top: 12px; font-size: 14px; }
    .success { color: #22c55e; margin-top: 12px; font-size: 14px; }
    .hidden { display: none; }
    .debug {
      margin-top: 16px;
      padding: 10px;
      background: #0f172a;
      border-radius: 6px;
      text-align: left;
      font-family: monospace;
      font-size: 10px;
      color: #64748b;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦊</div>
    <h1>Reset Password</h1>
    <p id="subtitle">Enter your new password below</p>

    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="New password" required minlength="6"/>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required/>
      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <div id="message" class="hidden"></div>
    <div id="debugLog" class="debug hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // MUST match src/lib/supabase.ts
    const SUPABASE_URL = 'https://qhiietjvfuekfaehddox.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoaWlldGp2ZnVla2ZhZWhkZG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAxNDY3MTAsImV4cCI6MjA2NTcyMjcxMH0.Ae-xBpuSnLcQpWGC8COR3N_5BAjdJ6cqkzP4rnCJAzA';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetForm');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const subtitle = document.getElementById('subtitle');
    const debugLog = document.getElementById('debugLog');

    function log(text) {
      console.log('[Reset]', text);
      const line = document.createElement('div');
      line.textContent = text;
      debugLog.appendChild(line);
      debugLog.classList.remove('hidden');
    }

    function showError(text) {
      message.textContent = text;
      message.className = 'error';
      message.classList.remove('hidden');
    }

    function showSuccess(text) {
      message.textContent = text;
      message.className = 'success';
      message.classList.remove('hidden');
    }

    // Parse params: ?token=xxx&type=recovery&email=user@example.com
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const type = params.get('type');
    const email = params.get('email');

    log('Token present: ' + !!token);
    log('Type: ' + type);
    log('Email present: ' + !!email);

    if (!token || !email || type !== 'recovery') {
      showError('Invalid or expired reset link. Please request a new one from the Fennec app.');
      form.style.display = 'none';
      subtitle.textContent = 'Link error';
    }

    async function handleReset(e) {
      e.preventDefault();
      
      if (newPassword.value !== confirmPassword.value) {
        showError('Passwords do not match');
        return;
      }
      if (newPassword.value.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        log('Step 1: Verifying recovery token for ' + email);
        
        // Verify OTP token with email — this establishes a session
        const { data: verifyData, error: verifyError } = await client.auth.verifyOtp({
          email: email,
          token: token,
          type: 'recovery'
        });

        if (verifyError) {
          log('verifyOtp error: ' + verifyError.message);
          throw verifyError;
        }
        
        log('Step 2: Token verified. User: ' + (verifyData?.user?.email || 'OK'));

        // Double-check session is active
        const { data: { session } } = await client.auth.getSession();
        if (!session) {
          throw new Error('Session not established after verification');
        }
        log('Step 3: Session active for user ' + session.user.id.substring(0,8));

        // Update password
        log('Step 4: Updating password...');
        const { data: updateData, error: updateError } = await client.auth.updateUser({
          password: newPassword.value
        });

        if (updateError) {
          log('updateUser error: ' + updateError.message);
          throw updateError;
        }

        log('Step 5: Password updated!');
        showSuccess('Password updated! You can now sign in to the Fennec app with your new password.');
        form.style.display = 'none';
        subtitle.textContent = 'Success!';

      } catch (err) {
        log('ERROR: ' + (err.message || JSON.stringify(err)));
        showError(err.message || 'Something went wrong. Please request a new reset link.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    }

    form.addEventListener('submit', handleReset);
  </script>
</body>
</html>
