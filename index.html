<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fennec Academy — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; color: #f8fafc; }
    p { color: #94a3b8; margin-bottom: 24px; }
    input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      border: 1px solid #475569; border-radius: 8px; background: #0f172a;
      color: #f8fafc; font-size: 16px;
    }
    input:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%; padding: 12px; background: #3b82f6; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; margin-top: 12px; font-size: 14px; }
    .success { color: #22c55e; margin-top: 12px; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦊</div>
    <h1>Reset Password</h1>
    <p id="subtitle">Loading...</p>
    <div id="content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://qhiietjvfuekfaehddox.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoaWlldGp2ZnVla2ZhZWhkZG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAxNDY3MTAsImV4cCI6MjA2NTcyMjcxMH0.Ae-xBpuSnLcQpWGC8COR3N_5BAjdJ6cqkzP4rnCJAzA';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const content = document.getElementById('content');
    const subtitle = document.getElementById('subtitle');

    // Try to parse params from hash (ConfirmationURL redirect) or query (direct link)
    const hash = window.location.hash.substring(1);
    const hashParams = new URLSearchParams(hash);
    const queryParams = new URLSearchParams(window.location.search);

    const type = queryParams.get('type') || hashParams.get('type');
    const token = queryParams.get('token');
    const email = queryParams.get('email');
    const accessToken = hashParams.get('access_token');

    console.log('[Reset] hash:', hash, 'search:', window.location.search);

    // Mode: link from email with token+email, or redirected from Supabase with access_token
    if (accessToken && type === 'recovery') {
      // Supabase redirected here after verification - use setSession
      subtitle.textContent = 'Enter your new password';
      showSetPasswordForm(async (password) => {
        await client.auth.setSession({ access_token: accessToken, refresh_token: hashParams.get('refresh_token') || '' });
        const { error } = await client.auth.updateUser({ password });
        if (error) throw error;
      });
    } else if (token && email && type === 'recovery') {
      // Direct link from email - verifyOtp first
      subtitle.textContent = 'Enter your new password';
      showSetPasswordForm(async (password) => {
        const { error: verifyError } = await client.auth.verifyOtp({ email, token, type: 'recovery' });
        if (verifyError) throw verifyError;
        const { error: updateError } = await client.auth.updateUser({ password });
        if (updateError) throw updateError;
      });
    } else {
      // No valid params - show error
      subtitle.textContent = 'Link error';
      content.innerHTML = `
        <div class="error">Invalid or expired reset link. Token: ${token ? 'present' : 'none'}, Email: ${email || 'none'}, Type: ${type || 'none'}, Hash: ${hash ? 'present' : 'none'}</div>
        <p style="margin-top: 12px; color: #94a3b8; font-size: 12px;">Make sure you saved the email template in Supabase Dashboard and requested a fresh password reset from the app.</p>
        <p style="margin-top: 12px; color: #64748b; font-size: 11px;">URL: ${window.location.href}</p>
      `;
    }

    function showSetPasswordForm(submitFn) {
      content.innerHTML = `
        <div id="pwdForm">
          <input type="password" id="np" placeholder="New password" required minlength="6"/>
          <input type="password" id="cp" placeholder="Confirm new password" required/>
          <button id="btn">Update Password</button>
        </div>
        <div id="msg"></div>
      `;
      document.getElementById('btn').onclick = async () => {
        const np = document.getElementById('np');
        const cp = document.getElementById('cp');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btn');
        if (np.value !== cp.value) { msg.innerHTML = '<div class="error">Passwords do not match</div>'; return; }
        if (np.value.length < 6) { msg.innerHTML = '<div class="error">Password must be at least 6 characters</div>'; return; }
        btn.disabled = true; btn.textContent = 'Updating...';
        try {
          await submitFn(np.value);
          msg.innerHTML = '<div class="success">Password updated! You can now sign in with your new password.</div>';
          document.getElementById('pwdForm').style.display = 'none';
          subtitle.textContent = 'Success!';
        } catch (err) {
          msg.innerHTML = '<div class="error">' + (err.message || 'Error') + '</div>';
        } finally {
          btn.disabled = false; btn.textContent = 'Update Password';
        }
      };
    }
  </script>
</body>
</html>
